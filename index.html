<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live Gallery</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0e0e0e;
    --surface: #1a1a1a;
    --border:  #2a2a2a;
    --text:    #e8e8e8;
    --dim:     #888;
    --accent:  #d4a94a;
    --gap:     3px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    background: rgba(14,14,14,.92);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .brand { font-size: 1rem; font-weight: 600; letter-spacing: .05em; }
  .brand span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 16px; font-size: .8rem; color: var(--dim); }
  .live-dot {
    display: inline-block; width: 7px; height: 7px;
    border-radius: 50%; background: #4caf50;
    animation: pulse 2s ease-in-out infinite;
    margin-right: 5px;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.4)} }
  #count { font-size: .8rem; color: var(--dim); }

  /* ── Event banner (shown when ?event= is set) ── */
  #event-banner {
    display: none;
    background: linear-gradient(135deg, #1a1025, #0f1a2e);
    border-bottom: 1px solid #2a1e3f;
    padding: 22px 20px 18px;
    text-align: center;
  }
  #event-banner .ev-label {
    font-size: .68rem; color: var(--accent);
    letter-spacing: .15em; text-transform: uppercase;
    margin-bottom: 6px;
  }
  #event-banner .ev-title {
    font-size: 1.6rem; font-weight: 800; color: #fff;
    line-height: 1.2;
  }
  #event-banner .ev-studio {
    font-size: .78rem; color: var(--dim);
    margin-top: 6px; letter-spacing: .08em; text-transform: uppercase;
  }

  /* ── Grid ── */
  #grid {
    columns: 4 220px;
    column-gap: var(--gap);
    padding: var(--gap);
  }
  .photo {
    break-inside: avoid;
    margin-bottom: var(--gap);
    overflow: hidden;
    cursor: zoom-in;
    position: relative;
    background: var(--surface);
  }
  .photo img { width: 100%; display: block; transition: transform .4s ease; }
  .photo:hover img { transform: scale(1.04); }
  .photo.new { animation: flash .7s ease; }
  @keyframes flash { 0%{outline: 2px solid var(--accent);outline-offset:2px} 100%{outline:0} }

  /* ── Empty state ── */
  #empty {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60vh; gap: 10px;
    color: var(--dim); font-size: .9rem;
  }

  /* ── Lightbox ── */
  #lightbox {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.95);
    align-items: center; justify-content: center; flex-direction: column;
  }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 92vw; max-height: 88vh; object-fit: contain; box-shadow: 0 20px 60px rgba(0,0,0,.8); }
  #lb-close {
    position: absolute; top: 16px; right: 20px;
    font-size: 2rem; color: rgba(255,255,255,.5);
    cursor: pointer; background: none; border: none; line-height: 1;
  }
  #lb-close:hover { color: #fff; }
  #lb-nav { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; }
  #lb-nav button {
    background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
    color: #fff; padding: 6px 18px; cursor: pointer; font-size: 1.2rem; border-radius: 4px;
  }
  #lb-nav button:hover { background: rgba(255,255,255,.2); }
  #lb-info { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); font-size: .72rem; color: rgba(255,255,255,.35); white-space: nowrap; }

  /* ── Load more ── */
  #load-more {
    display: block; margin: 24px auto;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--dim); padding: 10px 28px;
    cursor: pointer; font-size: .85rem; border-radius: 4px;
    transition: border-color .2s, color .2s;
  }
  #load-more:hover { border-color: var(--accent); color: var(--accent); }
  #load-more:disabled { opacity: .4; cursor: default; }
</style>
</head>
<body>

<header>
  <!-- Brand: shows studio name, or becomes smaller when event is active -->
  <div class="brand" id="header-brand">Supriya <span>Digitals</span></div>
  <div class="header-right">
    <span><span class="live-dot"></span>Live</span>
    <span id="count">Loading…</span>
  </div>
</header>

<!-- Event banner — visible when ?event= is in URL -->
<div id="event-banner">
  <div class="ev-label">📸 Live Gallery</div>
  <div class="ev-title" id="ev-title-text"></div>
  <div class="ev-studio" id="ev-studio-text">📷 Supriya Digitals</div>
</div>

<div id="grid"></div>
<div id="empty" style="display:none">
  <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
  <p>No photos yet — check back soon!</p>
</div>
<button id="load-more" style="display:none">Load more</button>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close">&#x2715;</button>
  <img id="lb-img" src="" alt=""/>
  <div id="lb-info"></div>
  <div id="lb-nav">
    <button id="lb-prev">&#8592;</button>
    <button id="lb-next">&#8594;</button>
  </div>
</div>

<script>
const API      = 'https://supriyadigitals.store/gallery/api.php';
const grid     = document.getElementById('grid');
const empty    = document.getElementById('empty');
const countEl  = document.getElementById('count');
const loadMore = document.getElementById('load-more');
const lightbox = document.getElementById('lightbox');
const lbImg    = document.getElementById('lb-img');
const lbInfo   = document.getElementById('lb-info');

let images  = [];
let page    = 1;
let total   = 0;
let hasMore = false;
let lbIndex = 0;
let lastId  = 0;

// ── Read event slug from URL ──────────────────────────────────────────────────
const urlParams  = new URLSearchParams(window.location.search);
const eventSlug  = urlParams.get('event') || '';

// ── Set up event banner if slug present ───────────────────────────────────────
if (eventSlug) {
  // Show the event banner
  document.getElementById('event-banner').style.display = 'block';

  // Convert slug → readable name for instant display while we wait
  const prettyName = eventSlug
    .split('-')
    .map(w => w.charAt(0).toUpperCase() + w.slice(1))
    .join(' ');
  document.getElementById('ev-title-text').textContent = prettyName;

  // Make header brand smaller / dimmed
  document.getElementById('header-brand').innerHTML =
    '<span style="font-size:.75rem;color:var(--dim);letter-spacing:.08em;text-transform:uppercase">📷 Supriya Digitals</span>';

  // Update page title
  document.title = prettyName + ' — Live Gallery';
}

// ── Initial load ──────────────────────────────────────────────────────────────
async function loadImages() {
  const eventParam = eventSlug ? `&event=${encodeURIComponent(eventSlug)}` : '';
  const res  = await fetch(`${API}?action=images&page=${page}&limit=40${eventParam}`);
  const data = await res.json();

  total   = data.total;
  hasMore = images.length + data.images.length < total;

  data.images.forEach(img => {
    images.push(img);
    grid.appendChild(makeCard(img, false));
  });

  if (data.images.length > 0) lastId = Math.max(lastId, data.images[0].id);

  updateUI();
  page++;
}

// ── Poll for new images every 10 s ────────────────────────────────────────────
async function poll() {
  if (!lastId) return;
  const eventParam = eventSlug ? `&event=${encodeURIComponent(eventSlug)}` : '';
  const res  = await fetch(`${API}?action=images&since=${lastId}${eventParam}`);
  const data = await res.json();
  if (!data.images || data.images.length === 0) return;

  data.images.forEach(img => {
    images.unshift(img);
    grid.insertBefore(makeCard(img, true), grid.firstChild);
  });

  lastId = data.images[0].id;
  total  = data.total;
  updateUI();
}

function makeCard(img, isNew) {
  const div = document.createElement('div');
  div.className = 'photo' + (isNew ? ' new' : '');
  div.dataset.id = img.id;
  const el = document.createElement('img');
  el.src = img.url; el.alt = ''; el.loading = 'lazy'; el.decoding = 'async';
  div.appendChild(el);
  div.addEventListener('click', () => openLightbox(img));
  return div;
}

function updateUI() {
  countEl.textContent = `${total} photo${total !== 1 ? 's' : ''}`;
  empty.style.display    = total === 0 ? 'flex' : 'none';
  loadMore.style.display = hasMore ? 'block' : 'none';
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
function openLightbox(img) {
  lbIndex = images.findIndex(i => i.id === img.id);
  showLb();
  lightbox.classList.add('open');
}
function showLb() {
  const img = images[lbIndex];
  lbImg.src = img.url;
  const kb  = img.file_size ? Math.round(img.file_size / 1024) + ' KB' : '';
  const dim = img.width && img.height ? `${img.width}×${img.height}` : '';
  lbInfo.textContent = [dim, kb].filter(Boolean).join('  ·  ');
}

document.getElementById('lb-close').onclick = () => lightbox.classList.remove('open');
document.getElementById('lb-prev').onclick  = () => { if (lbIndex < images.length - 1) { lbIndex++; showLb(); } };
document.getElementById('lb-next').onclick  = () => { if (lbIndex > 0) { lbIndex--; showLb(); } };

document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'Escape')     lightbox.classList.remove('open');
  if (e.key === 'ArrowLeft')  { if (lbIndex > 0) { lbIndex--; showLb(); } }
  if (e.key === 'ArrowRight') { if (lbIndex < images.length - 1) { lbIndex++; showLb(); } }
});

loadMore.onclick = async () => {
  loadMore.disabled = true;
  await loadImages();
  loadMore.disabled = false;
};

loadImages();
setInterval(poll, 10000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live Gallery</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  /* ── Reset & Tokens ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:     #0d0d0d;
    --paper:   #f7f4ef;
    --mist:    #e8e3da;
    --silver:  #a09890;
    --gold:    #c8a96e;
    --danger:  #c0392b;
    --safe:    #27ae60;
    --admin-bg:#111217;
    --admin-surface: #1a1d24;
    --admin-border:  #2a2d36;
    --admin-text:    #e2ddd5;
    --admin-dim:     #7a7870;
    --admin-accent:  #c8a96e;
    --admin-red:     #e05252;
    --admin-green:   #52e07e;
    --admin-blue:    #5295e0;
    font-size: 16px;
  }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--mist); border-radius: 3px; }

  /* ── Gallery Layout ── */
  #root { min-height: 100vh; }

  .gallery-root {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .gallery-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 2.4rem;
    background: rgba(247,244,239,0.85);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--mist);
  }
  .gallery-brand {
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ink);
    font-style: italic;
  }
  .gallery-brand span { font-style: normal; font-weight: 600; }
  .header-right {
    display: flex; align-items: center; gap: 1.4rem;
  }
  .live-badge {
    display: flex; align-items: center; gap: .5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: .7rem; letter-spacing: .1em;
    color: var(--silver);
    text-transform: uppercase;
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--safe);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  .live-dot.offline { background: var(--silver); animation: none; }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: .5; transform: scale(1.4); }
  }
  .count-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: .7rem; color: var(--silver);
    letter-spacing: .05em;
  }
  .admin-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: .7rem; letter-spacing: .12em; text-transform: uppercase;
    border: 1px solid var(--mist); background: none;
    color: var(--silver); padding: .4rem 1rem; cursor: pointer;
    transition: all .2s;
  }
  .admin-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* ── Gallery Grid ── */
  .gallery-main {
    padding-top: 5rem;
    flex: 1;
  }
  .gallery-grid {
    columns: 3 300px;
    column-gap: 2px;
    padding: 2px;
  }
  .photo-card {
    break-inside: avoid;
    display: block;
    margin-bottom: 2px;
    overflow: hidden;
    position: relative;
    cursor: zoom-in;
  }
  .photo-card img {
    width: 100%; display: block;
    transition: transform .5s cubic-bezier(.25,.46,.45,.94);
  }
  .photo-card:hover img { transform: scale(1.03); }
  .photo-card .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,.55) 0%, transparent 50%);
    opacity: 0; transition: opacity .3s;
    display: flex; align-items: flex-end; padding: 1rem;
  }
  .photo-card:hover .overlay { opacity: 1; }
  .overlay-meta {
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: .65rem; letter-spacing: .08em; line-height: 1.7;
  }

  /* New image entrance animation */
  .photo-card.new-entry {
    animation: slideIn .6s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-12px) scale(.98); }
    to   { opacity: 1; transform: none; }
  }

  /* ── Empty State ── */
  .empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 70vh; gap: 1rem;
    color: var(--silver);
  }
  .empty-state svg { opacity: .3; }
  .empty-state p { font-size: 1.1rem; font-style: italic; }
  .empty-state span { font-family: 'JetBrains Mono', monospace; font-size: .75rem; }

  /* ── Lightbox ── */
  .lightbox {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(13,13,13,.95);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
  .lightbox img {
    max-width: 92vw; max-height: 88vh;
    object-fit: contain;
    box-shadow: 0 30px 80px rgba(0,0,0,.7);
  }
  .lightbox-close {
    position: absolute; top: 1.5rem; right: 1.8rem;
    font-size: 1.8rem; color: rgba(255,255,255,.6);
    cursor: pointer; background: none; border: none;
    transition: color .2s;
  }
  .lightbox-close:hover { color: #fff; }
  .lightbox-meta {
    position: absolute; bottom: 2rem; left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: .68rem; color: rgba(255,255,255,.45);
    letter-spacing: .1em; text-align: center; line-height: 2;
    white-space: nowrap;
  }
  .lightbox-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: none; border: 1px solid rgba(255,255,255,.15);
    color: rgba(255,255,255,.5); font-size: 1.4rem;
    width: 2.8rem; height: 2.8rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .2s;
  }
  .lightbox-nav:hover { background: rgba(255,255,255,.08); color: #fff; }
  .lightbox-nav.prev { left: 1.5rem; }
  .lightbox-nav.next { right: 1.5rem; }

  /* ── Viewer counter (bottom right) ── */
  .viewer-pill {
    position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 99;
    display: flex; align-items: center; gap: .45rem;
    background: rgba(13,13,13,.75); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.1);
    padding: .4rem .9rem; border-radius: 2rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: .68rem; color: rgba(255,255,255,.5);
    letter-spacing: .08em;
    pointer-events: none;
  }

  /* ─────────────────────────────────────────────
     ADMIN PANEL
  ───────────────────────────────────────────── */
  .admin-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: var(--admin-bg);
    color: var(--admin-text);
    font-family: 'JetBrains Mono', monospace;
    overflow-y: auto;
    animation: slideUp .3s cubic-bezier(.22,1,.36,1);
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: none; opacity: 1; }
  }

  /* Login */
  .admin-login {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .login-card {
    background: var(--admin-surface);
    border: 1px solid var(--admin-border);
    padding: 2.5rem 3rem; width: 340px;
  }
  .login-card h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem; font-weight: 300; letter-spacing: .1em;
    color: var(--admin-accent); margin-bottom: 2rem;
    text-align: center;
  }
  .login-field { margin-bottom: 1.2rem; }
  .login-field label { display: block; font-size: .7rem; color: var(--admin-dim); margin-bottom: .4rem; letter-spacing: .1em; }
  .login-field input {
    width: 100%; background: var(--admin-bg);
    border: 1px solid var(--admin-border); color: var(--admin-text);
    padding: .6rem .9rem; font-family: 'JetBrains Mono', monospace;
    font-size: .82rem; outline: none;
    transition: border-color .2s;
  }
  .login-field input:focus { border-color: var(--admin-accent); }
  .login-btn {
    width: 100%; padding: .75rem;
    background: var(--admin-accent); color: var(--admin-bg);
    border: none; font-family: 'JetBrains Mono', monospace;
    font-size: .78rem; letter-spacing: .12em; text-transform: uppercase;
    cursor: pointer; margin-top: .5rem;
    transition: opacity .2s;
  }
  .login-btn:hover { opacity: .85; }
  .login-error { font-size: .7rem; color: var(--admin-red); margin-top: .7rem; text-align: center; }

  /* Admin layout */
  .admin-inner {
    max-width: 1400px; margin: 0 auto;
    padding: 1.5rem 2rem 4rem;
  }
  .admin-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--admin-border);
    margin-bottom: 2rem;
  }
  .admin-topbar-left { display: flex; align-items: center; gap: 1.2rem; }
  .admin-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem; font-weight: 300; letter-spacing: .12em;
    color: var(--admin-accent);
  }
  .admin-subtitle { font-size: .65rem; color: var(--admin-dim); letter-spacing: .08em; }
  .admin-close-btn {
    background: none; border: 1px solid var(--admin-border);
    color: var(--admin-dim); font-family: 'JetBrains Mono', monospace;
    font-size: .68rem; letter-spacing: .1em; padding: .4rem .9rem;
    cursor: pointer; transition: all .2s; text-transform: uppercase;
  }
  .admin-close-btn:hover { border-color: var(--admin-red); color: var(--admin-red); }

  /* Refresh row */
  .admin-refresh-row {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 2rem;
  }
  .refresh-btn {
    background: none; border: 1px solid var(--admin-border);
    color: var(--admin-dim); font-family: 'JetBrains Mono', monospace;
    font-size: .68rem; letter-spacing: .1em; padding: .35rem .8rem;
    cursor: pointer; transition: all .2s; text-transform: uppercase;
  }
  .refresh-btn:hover { border-color: var(--admin-accent); color: var(--admin-accent); }
  .last-refresh { font-size: .65rem; color: var(--admin-dim); }

  /* KPI cards */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1px; background: var(--admin-border);
    border: 1px solid var(--admin-border);
    margin-bottom: 2rem;
  }
  .kpi-card {
    background: var(--admin-surface);
    padding: 1.4rem 1.6rem;
  }
  .kpi-label { font-size: .62rem; color: var(--admin-dim); letter-spacing: .12em; text-transform: uppercase; margin-bottom: .5rem; }
  .kpi-value { font-size: 2rem; font-weight: 500; line-height: 1; color: var(--admin-text); }
  .kpi-value.accent  { color: var(--admin-accent); }
  .kpi-value.green   { color: var(--admin-green);  }
  .kpi-value.red     { color: var(--admin-red);     }
  .kpi-value.blue    { color: var(--admin-blue);    }
  .kpi-sub { font-size: .62rem; color: var(--admin-dim); margin-top: .4rem; }

  /* Sections */
  .admin-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .admin-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .admin-section {
    background: var(--admin-surface);
    border: 1px solid var(--admin-border);
    padding: 1.4rem 1.6rem;
  }
  .section-title {
    font-size: .68rem; color: var(--admin-accent);
    letter-spacing: .14em; text-transform: uppercase;
    margin-bottom: 1.1rem;
    padding-bottom: .7rem;
    border-bottom: 1px solid var(--admin-border);
  }

  /* Upload rate bars */
  .rate-bar-wrap { margin-bottom: .55rem; }
  .rate-bar-label { display: flex; justify-content: space-between; font-size: .65rem; color: var(--admin-dim); margin-bottom: .2rem; }
  .rate-bar-bg { height: 4px; background: var(--admin-border); border-radius: 2px; }
  .rate-bar-fill { height: 4px; background: var(--admin-accent); border-radius: 2px; transition: width .8s ease; }

  /* Disk gauge */
  .disk-gauge-wrap { display: flex; align-items: center; gap: 1.2rem; margin-top: .5rem; }
  .disk-ring { flex-shrink: 0; }
  .disk-ring svg { display: block; }
  .disk-ring-text { font-size: .62rem; color: var(--admin-dim); margin-top: .3rem; text-align: center; }
  .disk-detail { flex: 1; }
  .disk-row { display: flex; justify-content: space-between; font-size: .68rem; color: var(--admin-dim); margin-bottom: .3rem; }
  .disk-row span:last-child { color: var(--admin-text); }

  /* Load bars */
  .load-row { display: flex; align-items: center; gap: .8rem; margin-bottom: .5rem; }
  .load-label { font-size: .65rem; color: var(--admin-dim); width: 3.5rem; flex-shrink: 0; }
  .load-bar-bg { flex: 1; height: 5px; background: var(--admin-border); border-radius: 3px; }
  .load-bar-fill { height: 5px; border-radius: 3px; transition: width .8s ease; }
  .load-val { font-size: .65rem; color: var(--admin-text); width: 2.5rem; text-align: right; flex-shrink: 0; }

  /* Viewer list */
  .viewer-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: .45rem 0;
    border-bottom: 1px solid var(--admin-border);
    font-size: .67rem;
  }
  .viewer-row:last-child { border-bottom: none; }
  .viewer-ip { color: var(--admin-blue); }
  .viewer-since { color: var(--admin-dim); }
  .viewer-active-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--admin-green); flex-shrink: 0; animation: pulse-dot 2s ease-in-out infinite; }

  /* Upload log table */
  .log-table { width: 100%; border-collapse: collapse; font-size: .65rem; }
  .log-table th {
    text-align: left; padding: .4rem .6rem;
    color: var(--admin-dim); font-weight: 400;
    border-bottom: 1px solid var(--admin-border);
    letter-spacing: .08em;
  }
  .log-table td { padding: .38rem .6rem; border-bottom: 1px solid rgba(42,45,54,.5); color: var(--admin-text); }
  .log-table tr:hover td { background: rgba(255,255,255,.02); }
  .badge { display: inline-block; padding: .15rem .55rem; border-radius: 2px; font-size: .62rem; letter-spacing: .06em; }
  .badge.success { background: rgba(82,224,126,.12); color: var(--admin-green); }
  .badge.failed  { background: rgba(224,82,82,.12);  color: var(--admin-red);   }

  /* Recent photos strip */
  .recent-strip { display: flex; gap: 6px; overflow-x: auto; padding-bottom: .4rem; }
  .recent-thumb { flex-shrink: 0; width: 70px; height: 50px; object-fit: cover; border: 1px solid var(--admin-border); }

  /* Sparkline */
  .sparkline-wrap { margin-top: .5rem; }
  .sparkline-bar-row { display: flex; align-items: flex-end; gap: 2px; height: 48px; }
  .sparkline-bar { flex: 1; background: var(--admin-accent); opacity: .6; min-height: 2px; border-radius: 1px 1px 0 0; transition: height .4s ease; }
  .sparkline-bar:hover { opacity: 1; }
  .sparkline-labels { display: flex; justify-content: space-between; margin-top: .3rem; }
  .sparkline-label { font-size: .55rem; color: var(--admin-dim); }

  /* Server time */
  .server-time { font-size: .7rem; color: var(--admin-accent); letter-spacing: .06em; }

  /* Responsive */
  @media (max-width: 900px) {
    .admin-grid, .admin-grid-3 { grid-template-columns: 1fr; }
    .gallery-grid { columns: 2 200px; }
  }
  @media (max-width: 600px) {
    .gallery-header { padding: 1rem 1.2rem; }
    .gallery-grid { columns: 1; }
    .admin-inner { padding: 1rem 1rem 3rem; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ─────────────────────────────────────────────────────────────────────────────
//  CONFIG — set your Synology API URL
// ─────────────────────────────────────────────────────────────────────────────
const API_BASE = 'https://supriyadigitals.store/gallery/api.php';
const ADMIN_TOKEN = 'X9v#L2q@8Mz!T7p$Wc4&Yn1^Rb6*Kd3HsF'; // same as config.php UPLOAD_TOKEN

// Derive gallery name from URL hostname (strip common prefixes/suffixes)
function deriveGalleryName() {
  try {
    const host = window.location.hostname;
    // e.g. "john.github.io" → "john", "photos.studio.com" → "studio"
    const parts = host.replace(/\.github\.io$/, '').replace(/\.pages\.dev$/, '').split('.');
    // If there's a meaningful subdomain or top-level name, use it
    const name = parts[0] !== 'www' ? parts[0] : (parts[1] || '');
    if (name && name !== 'localhost') {
      return name.charAt(0).toUpperCase() + name.slice(1);
    }
  } catch {}
  return null;
}

// ─────────────────────────────────────────────────────────────────────────────
//  Utilities
// ─────────────────────────────────────────────────────────────────────────────
function uuid() {
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
}

// Persistent session ID for viewer tracking
const SESSION_ID = (() => {
  let s = sessionStorage.getItem('gal_sid');
  if (!s) { s = uuid(); sessionStorage.setItem('gal_sid', s); }
  return s;
})();

function fmtBytes(b) {
  if (!b) return '—';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
}
function relTime(iso) {
  if (!iso) return '';
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 60) return Math.floor(diff) + 's ago';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  return Math.floor(diff/3600) + 'h ago';
}

// ─────────────────────────────────────────────────────────────────────────────
//  Admin Login
// ─────────────────────────────────────────────────────────────────────────────
function AdminLogin({ onAuth }) {
  const [user, setUser] = React.useState('');
  const [pass, setPass] = React.useState('');
  const [err,  setErr]  = React.useState('');

  function attempt(e) {
    e.preventDefault();
    // Client-side check (real check is on server token)
    if (user === 'Shanmuk27' && pass.length >= 6) {
      onAuth(pass);
    } else {
      setErr('Invalid credentials');
    }
  }

  return (
    <div className="admin-login">
      <div className="login-card">
        <h2>Admin Access</h2>
        <div className="login-field">
          <label>USERNAME</label>
          <input value={user} onChange={e=>setUser(e.target.value)} placeholder="admin" autoFocus/>
        </div>
        <div className="login-field">
          <label>PASSWORD / API TOKEN</label>
          <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••"/>
        </div>
        <button className="login-btn" onClick={attempt}>Enter</button>
        {err && <p className="login-error">{err}</p>}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
//  Disk Ring Component
// ─────────────────────────────────────────────────────────────────────────────
function DiskRing({ pct }) {
  const r = 32, cx = 40, cy = 40;
  const circ = 2 * Math.PI * r;
  const fill = circ * (1 - (pct||0)/100);
  const color = pct > 85 ? '#e05252' : pct > 65 ? '#c8a96e' : '#52e07e';
  return (
    <div className="disk-ring">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#2a2d36" strokeWidth="7"/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="7"
          strokeDasharray={circ} strokeDashoffset={fill}
          strokeLinecap="round"
          transform={`rotate(-90 ${cx} ${cy})`}
          style={{transition:'stroke-dashoffset .8s ease'}}
        />
        <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="middle"
          style={{fill:'#e2ddd5', fontSize:'13px', fontFamily:'JetBrains Mono'}}>
          {pct}%
        </text>
      </svg>
      <div className="disk-ring-text">DISK USED</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
//  Admin Panel
// ─────────────────────────────────────────────────────────────────────────────
function AdminPanel({ onClose, token }) {
  const [stats, setStats]   = React.useState(null);
  const [error, setError]   = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [lastRefresh, setLastRefresh] = React.useState(null);

  async function fetchStats() {
    setLoading(true); setError(null);
    try {
      const r = await fetch(`${API_BASE}?action=stats`, {
        headers: { 'X-Auth-Token': token }
      });
      if (r.status === 401) { setError('Unauthorized — check token'); return; }
      const d = await r.json();
      setStats(d);
      setLastRefresh(new Date());
    } catch (e) {
      setError('Cannot reach server: ' + e.message);
    } finally {
      setLoading(false);
    }
  }

  React.useEffect(() => {
    fetchStats();
    const iv = setInterval(fetchStats, 10000);
    return () => clearInterval(iv);
  }, []);

  const s = stats;

  // Sparkline normalisation
  let sparkMax = 1;
  if (s?.images?.hourly_24h?.length) {
    sparkMax = Math.max(...s.images.hourly_24h.map(r => parseInt(r.count)||0), 1);
  }

  // Load colour
  function loadColor(v) {
    if (v >= 4) return '#e05252';
    if (v >= 2) return '#c8a96e';
    return '#52e07e';
  }

  return (
    <div className="admin-overlay">
      <div className="admin-inner">
        {/* Topbar */}
        <div className="admin-topbar">
          <div className="admin-topbar-left">
            <div>
              <div className="admin-title">Admin Dashboard</div>
              <div className="admin-subtitle">Live Gallery Control Panel</div>
            </div>
            {s && <div className="server-time">{fmtTime(s.server?.server_time)}</div>}
          </div>
          <button className="admin-close-btn" onClick={onClose}>✕ Close</button>
        </div>

        {/* Refresh row */}
        <div className="admin-refresh-row">
          <button className="refresh-btn" onClick={fetchStats} disabled={loading}>
            {loading ? '⟳ Refreshing…' : '⟳ Refresh'}
          </button>
          {lastRefresh && (
            <span className="last-refresh">Last refresh: {fmtTime(lastRefresh.toISOString())} · Auto every 10 s</span>
          )}
        </div>

        {error && <div style={{color:'var(--admin-red)',fontSize:'.75rem',marginBottom:'1rem',padding:'.7rem',border:'1px solid var(--admin-red)',background:'rgba(224,82,82,.07)'}}>{error}</div>}

        {!s && !error && (
          <div style={{color:'var(--admin-dim)',fontSize:'.78rem',textAlign:'center',padding:'4rem'}}>Loading stats…</div>
        )}

        {s && <>
          {/* KPI row */}
          <div className="kpi-row">
            <div className="kpi-card">
              <div className="kpi-label">Total Photos</div>
              <div className="kpi-value accent">{s.images.total.toLocaleString()}</div>
              <div className="kpi-sub">{s.images.total_size_gb} GB stored</div>
            </div>
            <div className="kpi-card">
              <div className="kpi-label">Active Viewers</div>
              <div className="kpi-value green">{s.viewers.active}</div>
              <div className="kpi-sub">Last {30}s heartbeat window</div>
            </div>
            <div className="kpi-card">
              <div className="kpi-label">Uploads · Last 1h</div>
              <div className="kpi-value blue">{s.images.last_1h}</div>
              <div className="kpi-sub">{s.images.last_24h} in last 24 h</div>
            </div>
            <div className="kpi-card">
              <div className="kpi-label">Disk Free</div>
              <div className="kpi-value" style={{color: s.disk.used_pct>85?'var(--admin-red)':'var(--admin-green)'}}>
                {s.disk.free_gb} GB
              </div>
              <div className="kpi-sub">{s.disk.used_pct}% used of {s.disk.total_gb} GB</div>
            </div>
            <div className="kpi-card">
              <div className="kpi-label">Server Load (1m)</div>
              <div className="kpi-value" style={{color:loadColor(s.server.load_1m)}}>
                {s.server.load_1m?.toFixed(2) ?? '—'}
              </div>
              <div className="kpi-sub">5m: {s.server.load_5m?.toFixed(2)} · 15m: {s.server.load_15m?.toFixed(2)}</div>
            </div>
            <div className="kpi-card">
              <div className="kpi-label">PHP Memory</div>
              <div className="kpi-value" style={{fontSize:'1.5rem'}}>{s.server.mem_used_mb} MB</div>
              <div className="kpi-sub">Peak: {s.server.mem_peak_mb} MB</div>
            </div>
          </div>

          {/* Row 1: Upload sparkline + Disk + Server load */}
          <div className="admin-grid-3">
            {/* Upload rate sparkline */}
            <div className="admin-section">
              <div className="section-title">Upload Rate · 24h</div>
              {s.images.hourly_24h?.length ? <>
                <div className="sparkline-wrap">
                  <div className="sparkline-bar-row">
                    {s.images.hourly_24h.map((row,i) => (
                      <div key={i} className="sparkline-bar"
                        style={{height:`${Math.max(4, (parseInt(row.count)/sparkMax)*48)}px`}}
                        title={`${row.hour}: ${row.count} upload${row.count!=1?'s':''}`}
                      />
                    ))}
                  </div>
                  <div className="sparkline-labels">
                    <span className="sparkline-label">-24h</span>
                    <span className="sparkline-label">now</span>
                  </div>
                </div>
                <div style={{fontSize:'.62rem',color:'var(--admin-dim)',marginTop:'.6rem'}}>
                  Peak: {sparkMax} photos/hr
                </div>
              </> : <div style={{fontSize:'.68rem',color:'var(--admin-dim)'}}>No data yet</div>}
            </div>

            {/* Disk gauge */}
            <div className="admin-section">
              <div className="section-title">Disk Usage</div>
              <div className="disk-gauge-wrap">
                <DiskRing pct={s.disk.used_pct}/>
                <div className="disk-detail">
                  <div className="disk-row"><span>Total</span><span>{s.disk.total_gb} GB</span></div>
                  <div className="disk-row"><span>Used</span><span>{s.disk.used_gb} GB</span></div>
                  <div className="disk-row"><span>Free</span><span>{s.disk.free_gb} GB</span></div>
                  <div className="disk-row"><span>Photos</span><span>{s.images.total_size_gb} GB</span></div>
                </div>
              </div>
            </div>

            {/* Server load */}
            <div className="admin-section">
              <div className="section-title">Server Load</div>
              {[
                ['1 min',  s.server.load_1m,  8],
                ['5 min',  s.server.load_5m,  8],
                ['15 min', s.server.load_15m, 8],
              ].map(([label, val, max]) => (
                <div className="load-row" key={label}>
                  <div className="load-label">{label}</div>
                  <div className="load-bar-bg">
                    <div className="load-bar-fill"
                      style={{width:`${Math.min(100,(val||0)/max*100)}%`, background:loadColor(val||0)}}
                    />
                  </div>
                  <div className="load-val">{(val||0).toFixed(2)}</div>
                </div>
              ))}
              <div style={{marginTop:'1rem'}}>
                <div className="disk-row"><span>PHP ver.</span><span>{s.server.php_version}</span></div>
                <div className="disk-row"><span>Mem used</span><span>{s.server.mem_used_mb} MB</span></div>
              </div>
            </div>
          </div>

          {/* Row 2: Viewers + Recent photos */}
          <div className="admin-grid">
            {/* Active viewers */}
            <div className="admin-section">
              <div className="section-title">Active Viewers ({s.viewers.active})</div>
              {s.viewers.list?.length ? s.viewers.list.map((v,i) => (
                <div className="viewer-row" key={i}>
                  <div style={{display:'flex',alignItems:'center',gap:'.5rem'}}>
                    <div className="viewer-active-dot"/>
                    <span className="viewer-ip">{v.ip_address || '—'}</span>
                  </div>
                  <span className="viewer-since">{relTime(v.last_seen)}</span>
                </div>
              )) : (
                <div style={{fontSize:'.68rem',color:'var(--admin-dim)'}}>No active viewers</div>
              )}
            </div>

            {/* Recent photos strip */}
            <div className="admin-section">
              <div className="section-title">Recent Uploads</div>
              {s.images.recent?.length ? <>
                <div className="recent-strip">
                  {s.images.recent.map((img,i) => (
                    <img key={i} className="recent-thumb"
                      src={`https://supriyadigitals.store/gallery/photos/${img.filename}`}
                      alt={img.filename}
                    />
                  ))}
                </div>
                <div style={{marginTop:'1rem'}}>
                  {s.images.recent.slice(0,5).map((img,i) => (
                    <div className="viewer-row" key={i}>
                      <span style={{color:'var(--admin-text)',maxWidth:'55%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {img.filename}
                      </span>
                      <span style={{color:'var(--admin-dim)'}}>{fmtBytes(img.file_size)}</span>
                      <span style={{color:'var(--admin-dim)'}}>{relTime(img.uploaded_at)}</span>
                    </div>
                  ))}
                </div>
              </> : (
                <div style={{fontSize:'.68rem',color:'var(--admin-dim)'}}>No uploads yet</div>
              )}
            </div>
          </div>

          {/* Upload log */}
          <div className="admin-section" style={{marginBottom:'1.5rem'}}>
            <div className="section-title">Upload Log · Last 20</div>
            <div style={{overflowX:'auto'}}>
              <table className="log-table">
                <thead>
                  <tr>
                    <th>File</th>
                    <th>Size</th>
                    <th>Status</th>
                    <th>Error</th>
                    <th>Time</th>
                  </tr>
                </thead>
                <tbody>
                  {s.upload_log?.map((row,i) => (
                    <tr key={i}>
                      <td style={{maxWidth:'200px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{row.filename || '—'}</td>
                      <td>{fmtBytes(row.file_size)}</td>
                      <td><span className={`badge ${row.status}`}>{row.status}</span></td>
                      <td style={{color:'var(--admin-red)',maxWidth:'200px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{row.error_msg || '—'}</td>
                      <td style={{color:'var(--admin-dim)'}}>{fmtDate(row.logged_at)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </>}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
//  Main Gallery App
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  const [images,       setImages]       = React.useState([]);
  const [maxId,        setMaxId]        = React.useState(0);
  const [total,        setTotal]        = React.useState(0);
  const [loading,      setLoading]      = React.useState(true);
  const [live,         setLive]         = React.useState(false);
  const [activeViewers,setActiveViewers]= React.useState(null);
  const [newIds,       setNewIds]       = React.useState(new Set());
  const [lightbox,     setLightbox]     = React.useState(null); // index
  const [showAdmin,    setShowAdmin]    = React.useState(false);
  const [adminAuthed,  setAdminAuthed]  = React.useState(false);
  const [adminToken,   setAdminToken]   = React.useState('');
  const [page,         setPage]         = React.useState(1);
  const [hasMore,      setHasMore]      = React.useState(false);

  const galleryName = React.useMemo(() => deriveGalleryName(), []);

  // ── Initial load ──────────────────────────────────────────────────────────
  React.useEffect(() => {
    (async () => {
      try {
        const r = await fetch(`${API_BASE}?action=images&page=1&limit=40`);
        const d = await r.json();
        setImages(d.images || []);
        setTotal(d.total || 0);
        setHasMore(d.has_more || false);
        if (d.images?.length) setMaxId(d.images[0].id);
        setLive(true);
      } catch {}
      setLoading(false);
    })();
  }, []);

  // ── Polling — new images every 4 s ───────────────────────────────────────
  React.useEffect(() => {
    const iv = setInterval(async () => {
      if (maxId === 0) return;
      try {
        const r = await fetch(`${API_BASE}?action=images&since=${maxId}`);
        const d = await r.json();
        if (d.images?.length) {
          const ids = new Set(d.images.map(i => i.id));
          setNewIds(ids);
          setImages(prev => [...d.images, ...prev]);
          setMaxId(d.images[0].id);
          setTotal(d.total || 0);
          setTimeout(() => setNewIds(new Set()), 2000);
        }
        setLive(true);
      } catch {
        setLive(false);
      }
    }, 4000);
    return () => clearInterval(iv);
  }, [maxId]);

  // ── Heartbeat — viewer tracking every 20 s ────────────────────────────────
  React.useEffect(() => {
    async function beat() {
      try {
        const r = await fetch(`${API_BASE}?action=heartbeat`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({session_id: SESSION_ID}),
        });
        const d = await r.json();
        setActiveViewers(d.active_viewers ?? null);
      } catch {}
    }
    beat();
    const iv = setInterval(beat, 20000);
    return () => clearInterval(iv);
  }, []);

  // ── Load more ─────────────────────────────────────────────────────────────
  async function loadMore() {
    const nextPage = page + 1;
    const r = await fetch(`${API_BASE}?action=images&page=${nextPage}&limit=40`);
    const d = await r.json();
    setImages(prev => [...prev, ...d.images]);
    setPage(nextPage);
    setHasMore(d.has_more || false);
  }

  // ── Keyboard nav for lightbox ─────────────────────────────────────────────
  React.useEffect(() => {
    function onKey(e) {
      if (lightbox === null) return;
      if (e.key === 'Escape') setLightbox(null);
      if (e.key === 'ArrowRight') setLightbox(i => Math.min(i+1, images.length-1));
      if (e.key === 'ArrowLeft')  setLightbox(i => Math.max(i-1, 0));
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [lightbox, images.length]);

  const cur = lightbox !== null ? images[lightbox] : null;

  return (
    <div className="gallery-root">

      {/* Header */}
      <header className="gallery-header">
        {galleryName
          ? <div className="gallery-brand"><span>{galleryName}</span></div>
          : <div style={{width:'1px'}}/>
        }
        <div className="header-right">
          <div className="live-badge">
            <div className={`live-dot ${live ? '' : 'offline'}`}/>
            {live ? 'Live' : 'Offline'}
          </div>
          <div className="count-badge">{total.toLocaleString()} photos</div>
          <button className="admin-btn" onClick={() => setShowAdmin(true)}>Admin</button>
        </div>
      </header>

      {/* Gallery */}
      <main className="gallery-main">
        {loading && (
          <div className="empty-state">
            <span>Loading gallery…</span>
          </div>
        )}

        {!loading && images.length === 0 && (
          <div className="empty-state">
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
              <rect x="8" y="16" width="48" height="36" rx="3" stroke="currentColor" strokeWidth="1.5"/>
              <circle cx="22" cy="30" r="5" stroke="currentColor" strokeWidth="1.5"/>
              <path d="M8 42 l14-10 10 8 10-12 14 14" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round"/>
            </svg>
            <p>Waiting for photos…</p>
            <span>Images will appear here in real-time</span>
          </div>
        )}

        {images.length > 0 && (
          <>
            <div className="gallery-grid">
              {images.map((img, idx) => (
                <div
                  key={img.id}
                  className={`photo-card ${newIds.has(img.id) ? 'new-entry' : ''}`}
                  onClick={() => setLightbox(idx)}
                >
                  <img src={img.url} alt={img.filename} loading="lazy"/>
                  <div className="overlay">
                    <div className="overlay-meta">
                      {img.camera_model && <div>{img.camera_model}</div>}
                      {(img.focal_length || img.aperture || img.iso) && (
                        <div>
                          {img.focal_length && `${img.focal_length}mm`}
                          {img.aperture && ` ƒ/${img.aperture}`}
                          {img.iso && ` ISO ${img.iso}`}
                        </div>
                      )}
                      <div>{fmtDate(img.uploaded_at)}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {hasMore && (
              <div style={{textAlign:'center',padding:'2.5rem'}}>
                <button className="admin-btn" onClick={loadMore} style={{fontSize:'.78rem',padding:'.55rem 1.6rem'}}>
                  Load more
                </button>
              </div>
            )}
          </>
        )}
      </main>

      {/* Viewer pill */}
      {activeViewers !== null && (
        <div className="viewer-pill">
          <div className="live-dot" style={{width:'5px',height:'5px'}}/>
          {activeViewers} viewer{activeViewers !== 1 ? 's' : ''}
        </div>
      )}

      {/* Lightbox */}
      {lightbox !== null && cur && (
        <div className="lightbox" onClick={e => { if (e.target === e.currentTarget) setLightbox(null); }}>
          <button className="lightbox-close" onClick={() => setLightbox(null)}>✕</button>
          {lightbox > 0 && (
            <button className="lightbox-nav prev" onClick={() => setLightbox(i=>i-1)}>‹</button>
          )}
          <img src={cur.url} alt={cur.filename}/>
          {lightbox < images.length - 1 && (
            <button className="lightbox-nav next" onClick={() => setLightbox(i=>i+1)}>›</button>
          )}
          <div className="lightbox-meta">
            {[cur.camera_model, cur.focal_length&&`${cur.focal_length}mm`, cur.aperture&&`ƒ/${cur.aperture}`, cur.iso&&`ISO ${cur.iso}`].filter(Boolean).join(' · ')}
            {cur.taken_at && <><br/>{cur.taken_at}</>}
            <br/>
            {lightbox+1} / {images.length}
          </div>
        </div>
      )}

      {/* Admin panel */}
      {showAdmin && !adminAuthed && (
        <div className="admin-overlay">
          <AdminLogin onAuth={token => { setAdminToken(token); setAdminAuthed(true); }}/>
          <button className="admin-close-btn" style={{position:'absolute',top:'1.5rem',right:'1.5rem'}}
            onClick={() => setShowAdmin(false)}>✕</button>
        </div>
      )}
      {showAdmin && adminAuthed && (
        <AdminPanel token={adminToken} onClose={() => { setShowAdmin(false); setAdminAuthed(false); }}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

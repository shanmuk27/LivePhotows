<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gallery Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #f5f5f5;
    --surface: #ffffff;
    --border:  #e0e0e0;
    --text:    #1a1a1a;
    --dim:     #666;
    --accent:  #2563eb;
    --danger:  #dc2626;
    --success: #16a34a;
    --radius:  8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Login ── */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .login-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 36px 40px; width: 340px;
    box-shadow: 0 4px 24px rgba(0,0,0,.06);
  }
  .login-box h1 { font-size: 1.3rem; margin-bottom: 6px; }
  .login-box p  { color: var(--dim); margin-bottom: 24px; font-size: .85rem; }
  .field { margin-bottom: 14px; }
  .field label { display: block; margin-bottom: 5px; font-weight: 500; font-size: .82rem; }
  .field input {
    width: 100%; padding: 9px 12px;
    border: 1px solid var(--border); border-radius: 6px;
    font-size: .9rem; background: var(--bg);
    outline: none; transition: border-color .2s;
  }
  .field input:focus { border-color: var(--accent); }
  .btn-primary {
    width: 100%; padding: 10px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 6px; font-size: .9rem;
    cursor: pointer; font-weight: 500;
    transition: opacity .2s;
  }
  .btn-primary:hover { opacity: .88; }
  #login-error { color: var(--danger); font-size: .8rem; margin-top: 10px; text-align: center; display:none; }

  /* ── App ── */
  #app { display: none; }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 1rem; font-weight: 600; }
  header .right { display: flex; align-items: center; gap: 12px; color: var(--dim); font-size: .82rem; }
  #logout-btn {
    background: none; border: 1px solid var(--border); border-radius: 5px;
    padding: 5px 12px; cursor: pointer; color: var(--dim);
    font-size: .78rem;
  }
  #logout-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex; gap: 16px; padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .stat {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 20px;
    min-width: 120px;
  }
  .stat .val { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
  .stat .lbl { font-size: .75rem; color: var(--dim); margin-top: 2px; }

  /* ── Main layout ── */
  main { padding: 24px; max-width: 1200px; margin: 0 auto; }
  .section { margin-bottom: 32px; }
  .section h2 { font-size: .9rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: .06em; color: var(--dim); margin-bottom: 14px; }

  /* ── Upload zone ── */
  #drop-zone {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 40px 20px; text-align: center;
    cursor: pointer; transition: all .2s;
    background: var(--surface);
  }
  #drop-zone.drag-over { border-color: var(--accent); background: #eff6ff; }
  #drop-zone svg { opacity: .3; margin-bottom: 12px; }
  #drop-zone p { color: var(--dim); font-size: .9rem; }
  #drop-zone span { font-size: .78rem; color: #aaa; }
  #file-input { display: none; }

  /* ── Upload queue ── */
  #queue { margin-top: 14px; display: flex; flex-direction: column; gap: 6px; }
  .queue-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px; font-size: .82rem;
  }
  .queue-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .queue-item .status { font-size: .75rem; white-space: nowrap; }
  .status.uploading { color: var(--accent); }
  .status.done      { color: var(--success); }
  .status.fail      { color: var(--danger); }
  .progress-bar { height: 3px; border-radius: 2px; background: var(--border); margin-top: 4px; }
  .progress-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width .3s; }

  #upload-btn {
    margin-top: 14px; padding: 9px 24px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 6px; font-size: .85rem;
    cursor: pointer; font-weight: 500; display: none;
  }
  #upload-btn:hover { opacity: .88; }
  #upload-btn:disabled { opacity: .5; cursor: default; }

  /* ── Photo grid ── */
  #photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
  }
  .thumb {
    position: relative; overflow: hidden;
    border-radius: 6px; background: var(--border);
    aspect-ratio: 1;
  }
  .thumb img {
    width: 100%; height: 100%; object-fit: cover;
    display: block; transition: transform .3s;
  }
  .thumb:hover img { transform: scale(1.06); }
  .thumb .del-btn {
    position: absolute; top: 5px; right: 5px;
    background: rgba(0,0,0,.65); color: #fff;
    border: none; border-radius: 50%;
    width: 26px; height: 26px; cursor: pointer;
    font-size: .85rem; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .2s;
  }
  .thumb:hover .del-btn { opacity: 1; }
  .thumb .del-btn:hover { background: var(--danger); }
  .thumb .thumb-info {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,.5); color: #fff;
    font-size: .65rem; padding: 4px 6px;
    opacity: 0; transition: opacity .2s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .thumb:hover .thumb-info { opacity: 1; }

  #grid-loading { color: var(--dim); font-size: .85rem; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: #1a1a1a; color: #fff;
    padding: 10px 18px; border-radius: 6px;
    font-size: .82rem; opacity: 0; pointer-events: none;
    transition: opacity .25s; z-index: 999;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-box">
    <h1>Gallery Admin</h1>
    <p>Enter your password to manage photos</p>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pass-input" placeholder="Enter admin password" autocomplete="current-password"/>
    </div>
    <button class="btn-primary" onclick="login()">Sign in</button>
    <div id="login-error">Wrong password. Try again.</div>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <header>
    <h1>&#128247; Gallery Admin</h1>
    <div class="right">
      <a href="index.html" target="_blank" style="color:var(--accent);text-decoration:none;font-size:.82rem">&#8599; View gallery</a>
      <button id="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat"><div class="val" id="stat-total">—</div><div class="lbl">Total photos</div></div>
    <div class="stat"><div class="val" id="stat-size">—</div><div class="lbl">Storage used</div></div>
    <div class="stat"><div class="val" id="stat-time">—</div><div class="lbl">Last upload</div></div>
  </div>

  <main>

    <!-- Upload -->
    <div class="section">
      <h2>Upload Photos</h2>
      <div id="drop-zone" onclick="document.getElementById('file-input').click()">
        <svg width="40" height="40" fill="none" stroke="#888" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p>Click or drag &amp; drop photos here</p>
        <span>JPG, PNG, WebP, GIF — max 20 MB each</span>
      </div>
      <input type="file" id="file-input" accept="image/*" multiple/>
      <div id="queue"></div>
      <button id="upload-btn" onclick="uploadAll()">Upload selected photos</button>
    </div>

    <!-- Photo Grid -->
    <div class="section">
      <h2>All Photos</h2>
      <div id="grid-loading">Loading…</div>
      <div id="photo-grid"></div>
    </div>

  </main>
</div>

<div id="toast"></div>

<script>
const API = 'https://supriyadigitals.store/gallery/api.php';

let password    = '';
let pendingFiles = [];   // FileList items queued for upload

// ── Auth ──────────────────────────────────────────────────────────────────────
async function login() {
  const pass = document.getElementById('pass-input').value.trim();
  if (!pass) return;

  // Test the password against the stats endpoint
  const res = await fetch(`${API}?action=stats&pass=${encodeURIComponent(pass)}`);
  if (!res.ok) {
    document.getElementById('login-error').style.display = 'block';
    return;
  }

  password = pass;
  localStorage.setItem('gallery_pass', pass);
  showApp();
}

function logout() {
  localStorage.removeItem('gallery_pass');
  password = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pass-input').value = '';
}

// Try auto-login from localStorage
window.addEventListener('DOMContentLoaded', async () => {
  const saved = localStorage.getItem('gallery_pass');
  if (saved) {
    const res = await fetch(`${API}?action=stats&pass=${encodeURIComponent(saved)}`);
    if (res.ok) { password = saved; showApp(); }
  }

  document.getElementById('pass-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
});

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadStats();
  loadPhotos();
}

// ── Stats ─────────────────────────────────────────────────────────────────────
async function loadStats() {
  const res  = await fetch(`${API}?action=stats&pass=${encodeURIComponent(password)}`);
  const data = await res.json();

  document.getElementById('stat-total').textContent = data.total ?? '—';
  document.getElementById('stat-size').textContent  = formatSize(data.total_size);

  const last = data.recent?.[0];
  document.getElementById('stat-time').textContent  =
    last ? timeAgo(last.uploaded_at) : 'Never';
}

// ── File picker & drag-drop ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const zone  = document.getElementById('drop-zone');
  const input = document.getElementById('file-input');

  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    addFiles(e.dataTransfer.files);
  });

  input.addEventListener('change', () => addFiles(input.files));
});

function addFiles(fileList) {
  pendingFiles = [...pendingFiles, ...fileList];
  renderQueue();
  document.getElementById('upload-btn').style.display = 'block';
}

function renderQueue() {
  const queue = document.getElementById('queue');
  queue.innerHTML = '';
  pendingFiles.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'queue-item';
    div.id = `qi-${i}`;
    div.innerHTML = `
      <span class="name">${escHtml(f.name)}</span>
      <span class="status" id="qs-${i}">${formatSize(f.size)}</span>
    `;
    queue.appendChild(div);
  });
}

// ── Upload ────────────────────────────────────────────────────────────────────
async function uploadAll() {
  const btn = document.getElementById('upload-btn');
  btn.disabled = true;

  for (let i = 0; i < pendingFiles.length; i++) {
    const status = document.getElementById(`qs-${i}`);
    status.className = 'status uploading';
    status.textContent = 'Uploading…';

    const fd = new FormData();
    fd.append('action', 'upload');
    fd.append('pass',   password);
    fd.append('photo',  pendingFiles[i]);

    try {
      const res  = await fetch(API, { method: 'POST', body: fd });
      const data = await res.json();
      if (data.ok) {
        status.className = 'status done';
        status.textContent = '✓ Done';
      } else {
        status.className = 'status fail';
        status.textContent = '✗ ' + (data.error ?? 'Failed');
      }
    } catch {
      status.className = 'status fail';
      status.textContent = '✗ Network error';
    }
  }

  pendingFiles = [];
  btn.disabled = false;
  btn.style.display = 'none';
  document.getElementById('file-input').value = '';

  toast('Upload complete');
  loadStats();
  loadPhotos();   // refresh grid
}

// ── Photo grid ────────────────────────────────────────────────────────────────
async function loadPhotos() {
  const container = document.getElementById('photo-grid');
  document.getElementById('grid-loading').textContent = 'Loading…';
  container.innerHTML = '';

  let page = 1, loaded = 0, total = Infinity;
  while (loaded < total) {
    const res  = await fetch(`${API}?action=images&page=${page}&limit=40`);
    const data = await res.json();
    total = data.total;
    data.images.forEach(img => {
      container.appendChild(makeThumb(img));
      loaded++;
    });
    page++;
    if (data.images.length === 0) break;
  }

  document.getElementById('grid-loading').textContent = '';
  if (total === 0) document.getElementById('grid-loading').textContent = 'No photos yet.';
}

function makeThumb(img) {
  const div = document.createElement('div');
  div.className = 'thumb';
  div.innerHTML = `
    <img src="${img.url}" alt="" loading="lazy"/>
    <button class="del-btn" title="Delete">✕</button>
    <div class="thumb-info">${formatSize(img.file_size)}</div>
  `;
  div.querySelector('.del-btn').onclick = () => deletePhoto(img.id, div);
  return div;
}

async function deletePhoto(id, el) {
  if (!confirm('Delete this photo? This cannot be undone.')) return;

  const fd = new FormData();
  fd.append('action', 'delete');
  fd.append('pass',   password);
  fd.append('id',     id);

  const res  = await fetch(API, { method: 'POST', body: fd });
  const data = await res.json();

  if (data.ok) {
    el.remove();
    toast('Photo deleted');
    loadStats();
  } else {
    toast('Delete failed: ' + (data.error ?? 'Unknown error'));
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function formatSize(bytes) {
  if (!bytes) return '—';
  if (bytes < 1024)       return bytes + ' B';
  if (bytes < 1048576)    return Math.round(bytes / 1024) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function timeAgo(dtStr) {
  if (!dtStr) return '—';
  const diff = Math.floor((Date.now() - new Date(dtStr)) / 1000);
  if (diff < 60)   return diff + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
</body>
</html>
